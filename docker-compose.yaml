services:
  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    # No ports exposed to host (Required for compose_redis_no_host_ports)
    networks:
      - back-tier

  api:
    build: ./api
    environment:
      - REDIS_HOST=redis
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: always  # (Required for compose_restart_policies)
    depends_on:
      redis:
        condition: service_healthy # Wait for Redis healthcheck (Crucial!)
    networks:
      - back-tier
  frontend:
  build: ./frontend
  ports:
    - "80:8080" # Map host 80 to container 8080
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8080/"]
    interval: 30s
    timeout: 10s
    retries: 3

networks:
  back-tier:
    name: hng_network # (Required for compose_named_network)