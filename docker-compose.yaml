
services:

  api:
    build: ./api
    ports:
      - "8000:8000"   # ✅ moved to correct level
    environment:
      - REDIS_HOST=${REDIS_HOST}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: always
    mem_limit: 512m        # ✅ works in compose (deploy doesn't on non-swarm)
    cpus: 0.5

  worker:
    build: ./worker
    environment:
      - REDIS_HOST=${REDIS_HOST}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: always
    mem_limit: 512m
    cpus: 0.5

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network
    restart: always
    mem_limit: 512m
    cpus: 0.5

  redis:
    image: redis:7-alpine
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
    restart: always
    mem_limit: 256m
    cpus: 0.3

networks:
  app-network:
    driver: bridge