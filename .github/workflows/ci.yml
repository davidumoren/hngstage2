name: HNG Stage 2 CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  # STAGE 1: Build and Push
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Match your folder names exactly
        service: [api, frontend, worker] 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }} # Matched to your secret name

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/hng14-stage2-devops-${{ matrix.service }}:latest

  # STAGE 2: Verification
  verify-deployment:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "BACKEND_PORT=8000" >> .env
          echo "FRONTEND_PORT=80" >> .env

      - name: Test Docker Compose Startup
        run: |
          docker compose up -d
          echo "Waiting for healthchecks (30s)..."
          sleep 30
          docker compose ps
          
      - name: Check Container Status
        run: |
          # Verifies all 4 containers (redis + your 3 services) are running/healthy
          if [ $(docker compose ps --format json | grep -c "running") -lt 4 ]; then
            echo "Deployment verification failed!"
            docker compose logs
            exit 1
          fi
