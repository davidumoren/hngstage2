name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # STAGE 1 — LINT
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 on API
        run: flake8 api/main.py api/tests/ --max-line-length=120

      - name: Run flake8 on worker
        run: flake8 worker/worker.py --max-line-length=120

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run ESLint on frontend
        run: cd frontend && npx eslint app.js

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Run hadolint on Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

  # ─────────────────────────────────────────────
  # STAGE 2 — TEST
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: pip install -r api/requirements.txt

      - name: Run pytest with coverage
        run: |
          cd api
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4.6.2
        with:
          name: coverage-report
          path: api/coverage.xml

  # ─────────────────────────────────────────────
  # STAGE 3 — BUILD
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set image tags
        id: meta
        run: echo "sha_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v6.16.0
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ steps.meta.outputs.sha_tag }}
            localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v6.16.0
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ steps.meta.outputs.sha_tag }}
            localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6.16.0
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ steps.meta.outputs.sha_tag }}
            localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # STAGE 4 — SECURITY SCAN
  # ─────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0
        with:
          driver-opts: network=host

      - name: Rebuild images for scanning
        run: |
          docker buildx build --load -t localhost:5000/api:latest ./api
          docker buildx build --load -t localhost:5000/worker:latest ./worker
          docker buildx build --load -t localhost:5000/frontend:latest ./frontend

      - name: Install Trivy
        run: |
          wget -qO trivy.tar.gz \
            https://github.com/aquasecurity/trivy/releases/download/v0.51.1/trivy_0.51.1_Linux-64bit.tar.gz
          tar -xzf trivy.tar.gz trivy
          sudo mv trivy /usr/local/bin/

      - name: Scan API image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-api.sarif \
            localhost:5000/api:latest

      - name: Scan worker image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-worker.sarif \
            localhost:5000/worker:latest

      - name: Scan frontend image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-frontend.sarif \
            localhost:5000/frontend:latest

      - name: Upload SARIF results
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  # ─────────────────────────────────────────────
  # STAGE 5 — INTEGRATION TEST
  # ─────────────────────────────────────────────
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Create .env for compose
        run: |
          cat > .env <<EOF
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=
          API_URL=http://api:8000
          PORT=3000
          FRONTEND_PORT=3000
          EOF

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for frontend to be healthy
        run: |
          echo "Waiting for stack to be ready..."
          timeout 120 bash -c \
            'until curl -sf http://localhost:3000/health; do sleep 3; done'

      - name: Run integration test script
        run: |
          chmod +x tests/integration.sh
          INTEGRATION_TIMEOUT=60 bash tests/integration.sh

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────
  # STAGE 6 — DEPLOY (main branch only)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Write SSH deploy key
        run: |
          echo "${{ secrets.DEPLOY_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Rolling update via SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s << 'ENDSSH'
          set -euo pipefail
          cd ~/app

          echo "==> Pulling latest images..."
          docker compose pull

          for SERVICE in api worker frontend; do
            echo "==> Rolling update: $SERVICE"

            # Start new container alongside old one
            docker compose up -d --no-deps --build "$SERVICE"

            # Wait up to 60s for health check to pass
            TIMEOUT=60
            ELAPSED=0
            until [ "$(docker inspect --format='{{.State.Health.Status}}' \
              "$(docker compose ps -q "$SERVICE")")" = "healthy" ]; do
              if [ $ELAPSED -ge $TIMEOUT ]; then
                echo "ERROR: $SERVICE did not become healthy — aborting, old container left running"
                exit 1
              fi
              sleep 3
              ELAPSED=$((ELAPSED + 3))
            done

            echo "$SERVICE is healthy"
          done

          docker compose down --remove-orphans
          docker compose up -d
          echo "==> Deploy complete"
          ENDSSH

      - name: Clean up SSH key
        if: always()
        run: rm -f /tmp/deploy_key