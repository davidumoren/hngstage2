name: Stage 2 DevOps Pipeline

on:
  push:
    branches: ["*"]

env:
  REGISTRY: localhost:5000

jobs:

# =========================
# LINT
# =========================
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Python Lint Tools
        run: pip install flake8

      - name: Run Flake8
        run: flake8 api/ worker/

      - name: Run ESLint
        run: |
          cd frontend
          npm install
          npx eslint .

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          ignore: DL3018

# =========================
# TEST
# =========================
  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Test Dependencies
        run: pip install pytest pytest-cov requests

      - name: Run Unit Tests with Coverage
        run: |
          pytest --cov=api --cov-report=xml

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
      - name: Run Flake8 (Python Linting)
        run: flake8 api/ worker/ --count --select=E9,F63,F7,F82 --ignore=W292,W293 --show-source --statistics

# =========================
# BUILD (LOCAL REGISTRY)
# =========================
  build:
    needs: test
    runs-on: ubuntu-latest

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    strategy:
      matrix:
        service: [api, worker, frontend]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Image
        run: |
          docker build -t $REGISTRY/${{ matrix.service }}:latest ./${{ matrix.service }}
          docker tag $REGISTRY/${{ matrix.service }}:latest $REGISTRY/${{ matrix.service }}:${{ github.sha }}

      - name: Push Image to Local Registry
        run: |
          docker push $REGISTRY/${{ matrix.service }}:latest
          docker push $REGISTRY/${{ matrix.service }}:${{ github.sha }}

# =========================
# SECURITY SCAN
# =========================
  security-scan:
    needs: build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [api, worker, frontend]

    steps:
      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/${{ matrix.service }}:latest
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

# =========================
# INTEGRATION TEST
# =========================
  integration-test:
    needs: security-scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start Full Stack
        run: docker compose up -d

      - name: Wait for Services (Timeout 60s)
        run: |
          timeout 60 bash -c '
          until curl -s http://localhost:8000/health; do
            echo "Waiting for API..."
            sleep 3
          done
          '

      - name: Submit Job
        run: curl -X POST http://localhost:3000/job

      - name: Poll for Completion
        run: |
          timeout 60 bash -c '
          until curl -s http://localhost:3000/status | grep completed; do
            echo "Waiting for job..."
            sleep 3
          done
          '

      - name: Tear Down Stack
        if: always()
        run: docker compose down

# =========================
# DEPLOY (MAIN ONLY)
# =========================
  deploy:
    needs: integration-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Pull Latest Images
        run: docker compose pull

      - name: Rolling Update API
        run: |
          docker compose up -d --no-deps --build api

          timeout 60 bash -c '
          until docker inspect --format="{{.State.Health.Status}}" $(docker compose ps -q api) | grep healthy; do
            echo "Waiting for new API..."
            sleep 3
          done
          '

      - name: Rolling Update Worker
        run: docker compose up -d --no-deps --build worker

      - name: Rolling Update Frontend
        run: docker compose up -d --no-deps --build frontend