name: HNG Stage 2 CI/CD

on:
  push:
    branches: ["main"]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}

jobs:

  # -------------------------------
  # STAGE 0: Lint + Test
  # -------------------------------
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir flake8 pytest requests

      - name: Run Flake8
        run: |
          flake8 api/ worker/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          ignore: DL3018

      - name: Start services
        run: docker compose up -d

      - name: Wait for services (healthcheck)
        run: |
          echo "Waiting for services to be healthy..."
          for i in {1..30}; do
            if docker compose ps | grep -q "healthy"; then
              echo "Services are healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Services failed to become healthy"
          docker compose logs
          exit 1

      - name: Run tests
        run: pytest tests/

      - name: Shutdown services
        if: always()
        run: docker compose down


  # -------------------------------
  # STAGE 1: Build & Push
  # -------------------------------
  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [api, frontend, worker]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      #  Enables build caching (big performance boost)
      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}/hng14-stage2-devops-${{ matrix.service }}:latest
            ${{ env.IMAGE_NAME }}/hng14-stage2-devops-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}/hng14-stage2-devops-${{ matrix.service }}:latest
          format: table
          severity: CRITICAL,HIGH


  # -------------------------------
  # STAGE 2: Verification
  # -------------------------------
  verify-deployment:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create environment file
        run: |
          cat <<EOF > .env
          REDIS_HOST=redis
          REDIS_PORT=6379
          BACKEND_PORT=8000
          FRONTEND_PORT=80
          EOF

      - name: Start full stack
        run: docker compose up -d

      - name: Wait for services (healthcheck)
        run: |
          echo "Waiting for full system..."
          for i in {1..40}; do
            RUNNING=$(docker compose ps --format json | grep -c running || true)
            if [ "$RUNNING" -ge 4 ]; then
              echo "All services running"
              exit 0
            fi
            sleep 5
          done
          echo "Deployment failed"
          docker compose logs
          exit 1

      - name: Show service status
        run: docker compose ps

      - name: Cleanup
        if: always()
        run: docker compose down