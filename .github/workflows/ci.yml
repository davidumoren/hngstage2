name: HNG Stage 2 CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  # STAGE 1: Build and Push (Strictly first)
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, api, worker] # 'api' matches your backend folder name
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          # Tags follow your namespace
          tags: ${{ secrets.DOCKER_USERNAME }}/hng14-stage2-devops-${{ matrix.service }}:latest

  # STAGE 2: Verification (Strictly after Build/Push)
  verify-deployment:
    needs: build-and-push # This enforces the strict order
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "BACKEND_PORT=8000" >> .env
          echo "FRONTEND_PORT=80" >> .env
          echo "REDIS_URL=redis://redis:6379" >> .env

      - name: Test Docker Compose Startup
        working-directory: ./hng14-stage2-devops
        run: |
          docker compose up -d
          echo "Waiting for healthchecks to pass (30s)..."
          sleep 30
          docker compose ps
          
      - name: Check Container Status
        run: |
          # Fails the pipeline if any container is not 'healthy' or 'running'
          if [ $(docker compose ps --format json | grep -c "running") -lt 4 ]; then
            echo "One or more services failed to start!"
            docker compose logs
            exit 1
          fi
