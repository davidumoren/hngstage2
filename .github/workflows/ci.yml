name: HNG Stage 2 CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  # STAGE 0: Lint and Test
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install flake8 pytest requests
          
      - name: Run Flake8 (Python Linting)
        run: flake8 api/ worker/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Hadolint (Dockerfile Linting)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

      - name: Run Pytest
        run: |
          docker compose -f docker-compose.yml up -d
          sleep 15
          pytest tests/
          docker compose down

  # STAGE 1: Build and Push
  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, frontend, worker] 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/hng14-stage2-devops-${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/hng14-stage2-devops-${{ matrix.service }}:${{ github.sha }}

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/hng14-stage2-devops-${{ matrix.service }}:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  # STAGE 2: Verification
  verify-deployment:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "BACKEND_PORT=8000" >> .env
          echo "FRONTEND_PORT=80" >> .env
          
      - name: Test Docker Compose Startup
        run: |
          docker compose up -d
          echo "Waiting for healthchecks (30s)..."
          sleep 30
          docker compose ps
          
      - name: Check Container Status
        run: |
          if [ $(docker compose ps --format json | grep -c "running") -lt 4 ]; then
            echo "Deployment verification failed!"
            docker compose logs
            exit 1
          fi
