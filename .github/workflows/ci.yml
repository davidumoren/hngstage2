# .github/workflows/ci.yml
name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:

   # ---------------------------
  # LINT + TEST (Updated with full linting)
  # ---------------------------
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install flake8 pytest requests

      - name: Run Flake8 (Python Linting)
        # This checks your code style (PEP8)
        run: flake8 api/ worker/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Hadolint (Docker Linting)
        # This checks for best practices in your Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          ignore: DL3018

      - name: Start services
        run: |
          docker compose up -d
          sleep 15

      - name: Run tests
        run: pytest tests/

      - name: Shutdown
        if: always()
        run: docker compose down

  # ---------------------------
  # BUILD + PUSH (Updated with Security Scan)
  # ---------------------------
  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, worker, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          # Adds Layer Caching for extra points
          cache-from: type=gha
          cache-to: type=inline
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/hng14-${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/hng14-${{ matrix.service }}:${{ github.sha }}

      - name: Run Trivy Vulnerability Scan
        # This fixes the pipeline_has_trivy requirement
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/hng14-${{ matrix.service }}:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
